<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Recipe cards</title>
  <style>
    body{
      font-family: 'Georgia', serif;
      background-color: #faf8f5;
      color: #333;
      padding: 20px;
    }
    h1 {
      border-bottom: 2px solid lightyellow;
      padding-bottom: 10px;
      color: lightcoral;
    }

    .recipe-card {
      background-color: whitesmoke;
      border-top: 4px solid lightcoral;
      padding: 16px;
      margin-bottom: 10px;
      border-radius: 7px;
      box-shadow: 2px 2px 2px #ddd;
    }
    .recipe-title {
      text-transform: capitalize; color: linen;
    }
    .instructions {
      color: lightcoral; line-highlight: 1.5;
    }
  </style>
</head>
<body>
<h1>Digital Recipe Box</h1>
<script type="module" src="script.js"></script>
<div id="recipe-card"> retriving grandma's recipes...</div>
</body>
</html>
